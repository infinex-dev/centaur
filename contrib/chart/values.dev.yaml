secretManager:
  backend: onepassword
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key

postgres:
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD

slackbot:
  enabled: true
  image:
    pullPolicy: IfNotPresent

api:
  executionWorkerEnabled: true
  pluginWatcherEnabled: true
  image:
    pullPolicy: IfNotPresent
  egressDiscovery:
    enabled: false

sandbox:
  image:
    pullPolicy: IfNotPresent

laminar:
  enabled: true

ironProxy:
  image:
    pullPolicy: IfNotPresent
  manager:
    secretSource: onepassword

networkPolicy:
  # Colima/K3s exposes the Kubernetes API through a host-side endpoint port
  # behind the in-cluster kubernetes service. Local API pods need this broad
  # egress rule to create and attach sandbox pods during smoke tests.
  apiAdditionalEgress:
    - {}
