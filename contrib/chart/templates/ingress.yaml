{{- if and .Values.ingress.enabled .Values.slackbot.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
                port:
                  number: 3001
  {{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.ingress.slackbot.enabled .Values.slackbot.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot-tailscale") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
  {{- with .Values.ingress.slackbot.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.slackbot.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.slackbot.host }}
      host: {{ .Values.ingress.slackbot.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
                port:
                  number: 3001
  {{- with .Values.ingress.slackbot.tls }}
  tls:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
