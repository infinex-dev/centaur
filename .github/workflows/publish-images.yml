name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-images.yml
      - services/**
      - centaur_sdk/**
      - packages/**
      - tools/**
      - scripts/bootstrap-secrets.sh
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .agents/skills/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: centaur-api
            dockerfile: services/api/Dockerfile
            target: ""
          - service: slackbot
            image: centaur-slackbot
            dockerfile: services/slackbot/Dockerfile
            target: ""
          - service: firewall
            image: centaur-firewall
            dockerfile: services/firewall/Dockerfile
            target: ""
          - service: secrets
            image: centaur-secrets
            dockerfile: services/secrets/Dockerfile
            target: ""
          - service: pgbouncer
            image: centaur-pgbouncer
            dockerfile: services/pgbouncer/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            dockerfile: services/sandbox/Dockerfile
            target: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ghcr.io/paradigmxyz/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
