name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-runtime:
    name: Python runtime checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/

      - name: Compile
        run: uv run python -m compileall -q src/

  slackbot-contract:
    name: Slackbot TS contract checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace dependencies
        run: |
          corepack enable
          pnpm --dir apps/slackbot install

      - name: Type-check slackbot stream contracts
        run: pnpm --dir apps/slackbot exec tsc --noEmit
