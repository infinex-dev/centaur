# Production overlay values for the comms-factory deployment.
#
# Layered on TOP of contrib/chart/values.production-env.example.yaml by
# contrib/scripts/deploy-k8s-env.sh, which ALWAYS includes comms-factory for this
# deployment (no opt-in flag). The script overrides the image repositories + tags
# below via --set at deploy time (registry prefix + centaur's git $TAG; both the
# service and overlay images are built from in-repo source), so the `replace-me` /
# registry.local placeholders here are never used directly.
#
# In-cluster service hostnames assume the default Helm release name `centaur`
# (-> `centaur-centaur-*`), matching contrib/docs/deploy-env-runsheet.md. If you
# deploy with a different --release, override the *_BASE_URL env values to match.

overlay:
  image:
    repository: registry.local/centaur/comms-factory-centaur-overlay  # --set by deploy-k8s-env.sh
    tag: replace-me                                                    # --set by deploy-k8s-env.sh
    pullPolicy: IfNotPresent
    sourcePath: /overlay

attachedServices:
  comms-factory:
    enabled: true
    image:
      repository: registry.local/centaur/comms-factory-api  # --set by deploy-k8s-env.sh
      tag: replace-me                                        # --set by deploy-k8s-env.sh
      pullPolicy: IfNotPresent
    service:
      port: 8080
    # The comms-factory service talks to the Centaur API and Anthropic directly,
    # not through iron-proxy (matches the validated local wiring).
    proxy:
      enabled: false
    # Delivery routing (phase 2): GitHub REST + Typefully + display.dev are
    # direct HTTPS calls (proxy.enabled is false) — open port-443 egress.
    egressPorts:
      - 443
    # Bootstraps the least-privilege `service:comms-factory` API key (research
    # bundle only) from the COMMS_FACTORY_CAPABILITY_API_KEY secret-env token via
    # the generic attached-service key mechanism — no hardcoded base api_keys entry.
    serviceKey:
      name: "service:comms-factory"
      scopes: ["bundle:research"]
      envVar: COMMS_FACTORY_CAPABILITY_API_KEY
    env:
      CENTAUR_BASE_URL: http://centaur-centaur-api:8000
      # Native Centaur tool callbacks can include slow-but-successful external
      # research calls; keep this above the comms-factory client's 20s default so
      # callbacks are governed by the outer workflow/tool budget, not an early fail.
      CENTAUR_TIMEOUT_MS: "90000"
    secretEnv:
      COMMS_FACTORY_SERVICE_TOKEN:
        secretName: centaur-infra-env
        key: COMMS_FACTORY_SERVICE_TOKEN
      ANTHROPIC_API_KEY:
        secretName: centaur-infra-env
        key: ANTHROPIC_API_KEY
        optional: true
      CENTAUR_TOKEN:
        secretName: centaur-infra-env
        key: COMMS_FACTORY_CAPABILITY_API_KEY
      # Delivery tokens (phase 2). GITHUB_TOKEN is the SAME infra fine-grained
      # PAT repo-cache mounts, upgraded by the operator to Contents+PR write
      # (decision 2026-06-12 — see the plan's deviation log). "PRs only, never
      # lands code" is enforced by platform main's pull_request ruleset, not
      # the token.
      GITHUB_TOKEN:
        secretName: centaur-infra-env
        key: GITHUB_TOKEN
        optional: true
      TYPEFULLY_API_KEY:
        secretName: centaur-infra-env
        key: TYPEFULLY_API_KEY
        optional: true
      DISPLAYDEV_API_KEY:
        secretName: centaur-infra-env
        key: DISPLAYDEV_API_KEY
        optional: true

# Read-only repo cache the comms grounder reads real product facts from. Uses the
# agent image (repoCache.image defaults to sandbox.image, which the script --sets)
# and the GITHUB_TOKEN already in the infra secret.
repoCache:
  enabled: true
  # Refresh hourly instead of the chart default (86400s / daily) so comms
  # grounding sees recently-merged platform changes within the hour, not up to a
  # day late. These repos are small, so an hourly git fetch is cheap.
  syncIntervalSeconds: 3600
  # This list IS the repo_context allowlist too — the chart derives
  # REPO_CONTEXT_REPOSITORIES from it (workloads.yaml). The GITHUB_TOKEN in the
  # infra secret must have read access to every repo here, or the cache pod
  # fails to clone it and stays unready.
  repositories:
    - infinex-xyz/platform
    - infinex-xyz/agent-platform
    - infinex-xyz/context
  githubToken:
    existingSecretName: centaur-infra-env
    secretKey: GITHUB_TOKEN

api:
  # @firenze stays general-purpose: keep enabledTools empty (= all tools except
  # disabledTools) so the live bot keeps every tool it has today and ALSO gains
  # comms_factory / repo_context / company_context once the overlay is mounted.
  # websearch is removed from disabledTools in values.production-env.example.yaml
  # because comms grounding needs it.
  #
  # The general @mention bot runs on the claude-code harness (Anthropic), not
  # codex. iron-proxy swaps the real key in from the built-in ANTHROPIC_API_KEY
  # infra-secret binding, so the sandbox only ever sees a placeholder. The comms
  # workflows themselves use no harness (pure tool/gate); this only sets the live
  # bot's default. WARM_POOL_HARNESS MUST match defaultHarness — warm_pool rejects
  # any claim whose harness differs (warm_pool.py), so a mismatch cold-starts
  # every request while warm pods of the wrong harness sit idle and bill.
  defaultHarness: claude-code
  extraEnv:
    WARM_POOL_HARNESS: claude-code
    COMMS_FACTORY_BASE_URL: http://centaur-centaur-attached-comms-factory:8080
    CENTAUR_BASE_URL: http://centaur-centaur-api:8000
    REPO_CONTEXT_REPOSITORY_ALIASES: "infinex-platform=infinex-xyz/platform,platform=infinex-xyz/platform,agent-platform=infinex-xyz/agent-platform,context=infinex-xyz/context"

slackbot:
  extraEnv:
    # Slack triggers: `comms audit …` -> comms_audit, `comms generate|release …` -> comms_release.
    SLACK_WORKFLOW_COMMANDS: '[{"match":"^comms\\s+audit\\b[:\\s-]*(.*)$","workflow":"comms_audit","input":{"text":"$1"},"triggerSuffix":":comms_audit"},{"match":"^comms\\s+(?:generate|release)\\b[:\\s-]*(.*)$","workflow":"comms_release","input":{"brief":"$1"},"triggerSuffix":":comms_release"}]'
