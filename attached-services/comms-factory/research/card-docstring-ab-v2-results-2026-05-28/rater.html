<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Caption rater — A/B/C/D/E v2</title>
<style>
  :root {
    --bg: #0e1116;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --good: #4ade80;
    --warn: #f0c674;
    --bad: #ff6b6b;
    --infinex: #ffd86c;
    --code-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, system-ui, sans-serif; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 24px; margin: 0 0 6px; }
  h2 { font-size: 18px; margin: 32px 0 12px; }
  .sub { color: var(--muted); margin-bottom: 16px; font-size: 13px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    padding: 12px 16px; border-radius: 6px; margin-bottom: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  .topbar button:hover { border-color: var(--accent); }
  .topbar button.primary { background: var(--accent); color: #0e1116; border-color: var(--accent); font-weight: 600; }
  .topbar button.danger { color: var(--bad); border-color: var(--bad); }
  .topbar .stats { color: var(--muted); font-size: 12px; }
  .topbar select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; font-size: 13px; font-family: inherit; }

  /* Release section */
  .release {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 14px;
  }
  .release-header { margin-bottom: 10px; }
  .release-id { font-family: var(--code-mono); font-size: 13px; color: var(--accent); margin-right: 10px; }
  .release-title { font-size: 14px; font-weight: 600; }
  .release-desc { color: var(--muted); font-size: 12px; margin-top: 3px; }

  /* Reference tweet */
  .reference {
    margin-top: 10px;
    background: rgba(255, 216, 108, 0.06);
    border-left: 3px solid var(--infinex);
    border-radius: 4px;
    padding: 10px 14px;
  }
  .reference-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--infinex); font-weight: 700; margin-bottom: 4px;
  }
  .reference-text {
    font-family: var(--code-mono); font-size: 12px; line-height: 1.5; white-space: pre-wrap;
  }

  /* Caption card */
  .vcap {
    margin-top: 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 5px;
    padding: 12px 14px;
  }
  .vcap.current   { border-left-color: var(--bad); }
  .vcap.variant-a { border-left-color: var(--warn); }
  .vcap.variant-ap{ border-left-color: #d8b4fe; }
  .vcap.variant-bp{ border-left-color: var(--accent); }
  .vcap.variant-c { border-left-color: var(--good); }

  .vcap-header {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 8px; font-size: 11px;
  }
  .vcap-label {
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700;
  }
  .vcap-label.current   { color: var(--bad); }
  .vcap-label.variant-a { color: var(--warn); }
  .vcap-label.variant-ap{ color: #d8b4fe; }
  .vcap-label.variant-bp{ color: var(--accent); }
  .vcap-label.variant-c { color: var(--good); }
  .scores { color: var(--muted); }

  .vcap-text {
    font-family: var(--code-mono); font-size: 12.5px; line-height: 1.6;
    white-space: pre-wrap; padding: 8px 10px;
    background: rgba(0,0,0,0.2); border-radius: 4px;
    margin-bottom: 10px;
  }

  /* Rating widget */
  .rating-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; font-size: 12px; }
  .rating { display: flex; align-items: center; gap: 4px; }
  .rating-label { color: var(--muted); font-size: 11px; margin-right: 2px; min-width: 36px; }
  .star {
    cursor: pointer; user-select: none;
    color: var(--border); font-size: 18px; line-height: 1;
    padding: 0 2px;
    transition: color 0.1s;
  }
  .star.active { color: var(--infinex); }
  .star:hover { color: var(--infinex); opacity: 0.6; }
  .rating.tov .star.active { color: var(--good); }
  .rating.slop .star.active { color: var(--bad); }

  /* Tags */
  .tags-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag-button {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px; border-radius: 12px;
    font-size: 11px; cursor: pointer;
    font-family: inherit;
  }
  .tag-button.bad { border-color: rgba(255,107,107,0.4); }
  .tag-button.bad.active {
    background: rgba(255,107,107,0.2);
    border-color: var(--bad);
    color: var(--bad);
    font-weight: 600;
  }
  .tag-button.good { border-color: rgba(74,222,128,0.4); }
  .tag-button.good.active {
    background: rgba(74,222,128,0.2);
    border-color: var(--good);
    color: var(--good);
    font-weight: 600;
  }

  /* Notes */
  .notes-row { margin-top: 8px; }
  .notes-row textarea {
    width: 100%; min-height: 44px;
    background: rgba(0,0,0,0.2);
    color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 4px;
    font: 12.5px/1.5 var(--code-mono);
    resize: vertical;
  }
  .notes-row textarea::placeholder { color: var(--muted); }

  /* Prompt accordion */
  details.prompt-view {
    margin-top: 8px;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0;
  }
  details.prompt-view summary {
    padding: 6px 12px; cursor: pointer;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    user-select: none;
  }
  details.prompt-view summary:hover { color: var(--text); }
  details.prompt-view[open] summary { border-bottom: 1px solid var(--border); }
  details.prompt-view .prompt-content {
    padding: 10px 12px;
    font-family: var(--code-mono); font-size: 11.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  details.prompt-view .prompt-section {
    margin-bottom: 10px;
  }
  details.prompt-view .prompt-section-label {
    color: var(--muted); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  details.prompt-view .docstring {
    background: rgba(255, 107, 107, 0.05);
    border-left: 2px solid var(--border);
    padding: 6px 10px; border-radius: 2px;
  }
  details.prompt-view .grounded {
    background: rgba(88, 166, 255, 0.05);
    border-left: 2px solid var(--accent);
    padding: 6px 10px; border-radius: 2px;
  }

  /* Filter hidden */
  .release.hidden, .vcap.hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Caption rater — A/B/C/D/E v2</h1>
  <div class="sub">50 captions across 10 releases × 5 variants. Rate ToV (1–5) and slop level (1–5), tag issues, leave notes. Auto-saves to your browser. Export when done.</div>

  <div class="topbar">
    <button id="export-btn" class="primary">Export ratings as JSON</button>
    <select id="filter-variant">
      <option value="all">All variants</option>
      <option value="CURRENT">CURRENT only</option>
      <option value="VARIANT_A">A only</option>
      <option value="VARIANT_A_PRIME">A' only</option>
      <option value="VARIANT_B_PRIME">B' only</option>
      <option value="VARIANT_C">C only</option>
    </select>
    <select id="filter-rated">
      <option value="all">All (rated + unrated)</option>
      <option value="unrated">Unrated only</option>
      <option value="rated">Rated only</option>
    </select>
    <span class="stats" id="stats">0 / 50 rated</span>
    <span style="flex-grow:1"></span>
    <button id="clear-btn" class="danger">Clear all ratings</button>
  </div>

  <div id="content"></div>
</div>

  VARIANT_A: 'VARIANT A',
  VARIANT_A_PRIME: "VARIANT A'",
  VARIANT_B_PRIME: "VARIANT B'",
  VARIANT_C: 'VARIANT C',
};
const VARIANT_CLASSES = {
  CURRENT: 'current',
  VARIANT_A: 'variant-a',
  VARIANT_A_PRIME: 'variant-ap',
  VARIANT_B_PRIME: 'variant-bp',
  VARIANT_C: 'variant-c',
};

const TAGS = [
  { id: 'staccato', label: 'staccato', kind: 'bad' },
  { id: 'bad_grammar', label: 'bad grammar', kind: 'bad' },
  { id: 'philosophical_opener', label: 'philosophical opener', kind: 'bad' },
  { id: 'too_conceptual', label: 'too conceptual', kind: 'bad' },
  { id: 'generic', label: 'generic / any-brand', kind: 'bad' },
  { id: 'ai_slop', label: 'AI slop', kind: 'bad' },
  { id: 'no_arrow', label: 'missing → / ↓', kind: 'bad' },
  { id: 'on_character', label: 'on-character ✓', kind: 'good' },
];

const STORAGE_KEY = 'caption-rater-v2';

function loadRatings() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveRatings(r) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(r));
}

let ratings = loadRatings();

function ratingKey(release_id, variant_id) {
  return `${release_id}::${variant_id}`;
}

function isRated(release_id, variant_id) {
  const r = ratings[ratingKey(release_id, variant_id)];
  if (!r) return false;
  return (r.tov || 0) > 0 || (r.slop || 0) > 0 || (r.tags && r.tags.length > 0) || (r.notes && r.notes.trim().length > 0);
}

function updateStats() {
  const rated = ROWS.filter(r => isRated(r.release_id, r.variant_id)).length;
  document.getElementById('stats').textContent = `${rated} / ${ROWS.length} rated`;
}

function renderStars(container, kind, currentValue, onChange) {
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i <= currentValue ? ' active' : '');
    s.textContent = '★';
    s.dataset.value = i;
    s.addEventListener('click', () => onChange(i === currentValue ? 0 : i));
    container.appendChild(s);
  }
}

function renderTags(container, currentTags, onChange) {
  container.innerHTML = '';
  for (const t of TAGS) {
    const b = document.createElement('button');
    b.className = 'tag-button ' + t.kind + (currentTags.includes(t.id) ? ' active' : '');
    b.textContent = t.label;
    b.addEventListener('click', () => {
      const next = currentTags.includes(t.id) ? currentTags.filter(x => x !== t.id) : [...currentTags, t.id];
      onChange(next);
    });
    container.appendChild(b);
  }
}

function makeCaptionCard(row) {
  const key = ratingKey(row.release_id, row.variant_id);
  const r = ratings[key] || { tov: 0, slop: 0, tags: [], notes: '' };
  const cls = VARIANT_CLASSES[row.variant_id];

  const card = document.createElement('div');
  card.className = 'vcap ' + cls;
  card.dataset.variant = row.variant_id;
  card.dataset.releaseId = row.release_id;

  const header = document.createElement('div');
  header.className = 'vcap-header';
  const label = document.createElement('span');
  label.className = 'vcap-label ' + cls;
  label.textContent = VARIANT_LABELS[row.variant_id];
  header.appendChild(label);

  const scores = document.createElement('span');
  scores.className = 'scores';
  const flags = [];
  if (row.wall_present) flags.push('WALL');
  if (row.refusing_present) flags.push('REFUS');
  if (row.eliminate_present) flags.push('ELIM');
  if (row.surface_anchor_hit) flags.push('SURFACE');
  scores.textContent = `judge anchor ${row.anchoring_score} · ship ${row.ship_quality} · voice ${row.voice_fit} · ${row.caption_length}c${flags.length ? ' · ' + flags.join(',') : ''}`;
  header.appendChild(scores);
  card.appendChild(header);

  const text = document.createElement('div');
  text.className = 'vcap-text';
  text.textContent = row.caption;
  card.appendChild(text);

  // Rating row
  const ratingRow = document.createElement('div');
  ratingRow.className = 'rating-row';

  const tovWrap = document.createElement('div');
  tovWrap.className = 'rating tov';
  const tovLabel = document.createElement('span');
  tovLabel.className = 'rating-label';
  tovLabel.textContent = 'ToV';
  tovWrap.appendChild(tovLabel);
  const tovStars = document.createElement('div');
  tovStars.style.display = 'flex';
  tovWrap.appendChild(tovStars);
  renderStars(tovStars, 'tov', r.tov, (v) => {
    r.tov = v;
    ratings[key] = r;
    saveRatings(ratings);
    renderStars(tovStars, 'tov', r.tov, arguments.callee);
    updateStats();
  });
  ratingRow.appendChild(tovWrap);

  const slopWrap = document.createElement('div');
  slopWrap.className = 'rating slop';
  const slopLabel = document.createElement('span');
  slopLabel.className = 'rating-label';
  slopLabel.textContent = 'Slop';
  slopWrap.appendChild(slopLabel);
  const slopStars = document.createElement('div');
  slopStars.style.display = 'flex';
  slopWrap.appendChild(slopStars);
  renderStars(slopStars, 'slop', r.slop, (v) => {
    r.slop = v;
    ratings[key] = r;
    saveRatings(ratings);
    renderStars(slopStars, 'slop', r.slop, arguments.callee);
    updateStats();
  });
  ratingRow.appendChild(slopWrap);

  const hint = document.createElement('span');
  hint.style.color = 'var(--muted)';
  hint.style.fontSize = '11px';
  hint.textContent = '(higher ★ = better ToV / less slop)';
  ratingRow.appendChild(hint);

  card.appendChild(ratingRow);

  // Tags
  const tagsRow = document.createElement('div');
  tagsRow.className = 'tags-row';
  renderTags(tagsRow, r.tags, (next) => {
    r.tags = next;
    ratings[key] = r;
    saveRatings(ratings);
    renderTags(tagsRow, r.tags, arguments.callee);
    updateStats();
  });
  card.appendChild(tagsRow);

  // Notes
  const notesRow = document.createElement('div');
  notesRow.className = 'notes-row';
  const notes = document.createElement('textarea');
  notes.placeholder = 'Notes (optional) — what specifically is on/off about this caption?';
  notes.value = r.notes || '';
  notes.addEventListener('input', () => {
    r.notes = notes.value;
    ratings[key] = r;
    saveRatings(ratings);
    updateStats();
  });
  notesRow.appendChild(notes);
  card.appendChild(notesRow);

  // Prompt accordion
  const det = document.createElement('details');
  det.className = 'prompt-view';
  const sum = document.createElement('summary');
  sum.textContent = 'View prompt context (docstring + grounded card fields)';
  det.appendChild(sum);
  const content = document.createElement('div');
  content.className = 'prompt-content';

  const ds = document.createElement('div');
  ds.className = 'prompt-section';
  ds.innerHTML = `<div class="prompt-section-label">Docstring shown to grounder (${VARIANT_LABELS[row.variant_id]})</div><div class="docstring" id="docstring-${key.replace(/[:.]/g,'-')}"></div>`;
  content.appendChild(ds);

  const gr = document.createElement('div');
  gr.className = 'prompt-section';
  gr.innerHTML = `<div class="prompt-section-label">Grounded card (fed to generator)</div><div class="grounded"><strong>through_action:</strong> ${escapeHtml(row.through_action)}\n<strong>lining:</strong> ${escapeHtml(row.lining)}</div>`;
  content.appendChild(gr);

  if (row.notes) {
    const jn = document.createElement('div');
    jn.className = 'prompt-section';
    jn.innerHTML = `<div class="prompt-section-label">LLM judge's note</div><div style="color:var(--muted)">${escapeHtml(row.notes)}</div>`;
    content.appendChild(jn);
  }

  det.appendChild(content);
  card.appendChild(det);

  // Populate docstring after element is in DOM (via setTimeout)
  setTimeout(() => {
    const el = document.getElementById(`docstring-${key.replace(/[:.]/g,'-')}`);
    if (el) el.textContent = DOCSTRINGS[row.variant_id] || '(docstring not embedded)';
  }, 0);

  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const DOCSTRINGS = {
  CURRENT: `// through_action:\n// The transitive verb chain — "to <verb> <object>" — describing what THIS\n// post is doing toward the brand's Super-Objective. Per-release.\n// Example: "to reveal that the bank wall just dissolved inside one account".\n\n// lining:\n// Example: "on the surface: a new fiat deposit rail. underneath: the\n// bank-vs-wallet wall just stopped existing for Infinex users."`,
  VARIANT_A: `// through_action:\n// The transitive verb chain — "to <verb> <object>" — describing what THIS\n// post is doing toward the brand's Super-Objective. Per-release.\n// Example: "to reveal that a necessary intermediate step just evaporated".\n\n// lining:\n// Example: "on the surface: a feature ships. underneath: the precondition\n// for self-service is now met."`,
  VARIANT_A_PRIME: `// through_action:\n// Examples (vary by release type — pick the shape closest to the release,\n// then write fresh rather than substituting words):\n//   disappearance: "to reveal that a necessary intermediate step just evaporated"\n//   permission:    "to give users direct access where they previously had none"\n//   exposition:    "to mark what the product proves about the user's position"\n\n// lining:\n// Examples (vary by release type):\n//   "on the surface: a feature ships. underneath: the precondition for\n//    self-service is now met."\n//   "on the surface: a control is added. underneath: the user moves from\n//    bystander to participant."\n//   "on the surface: a number lands. underneath: the bet the product made\n//    last year is now legible."`,
  VARIANT_B_PRIME: `// through_action:\n// Stanislavski-Mirodan "through-action": the character's pursued objective\n// for this scene (Mirodan §13, pp. 282-306).\n// Structural template: "to <transitive verb> <object naming the scene's\n// central observation>"\n// Properties: transitive verb; object names the structural shift; no\n// product-specific nouns; no brand metaphors.\n\n// lining:\n// Structural template: "on the surface: <visible Outer action>.\n// underneath: <hidden Inner Action — what the prose carries but does not state>."\n// Properties: two-clause structure. Surface names the visible Outer\n// (Mirodan §7.1). Underneath names what the prose carries underneath but\n// does not declare. The dramatic gap between the two is the engine.`,
  VARIANT_C: `// through_action:\n// Stanislavski-Mirodan "through-action" (Mirodan §13, pp. 282-306):\n// the character's pursued objective for this scene.\n// Required: transitive verb; object names the structural shift this post\n// performs.\n// Forbidden: product-specific nouns; brand metaphors; mechanical\n// descriptions (rails, plumbing, feature taxonomies).\n\n// lining:\n// Required: two-clause structure; surface clause names the visible Outer;\n// underneath clause names what the prose carries but refuses to perform.\n// Forbidden: product mechanics on either side; brand metaphors; explicit\n// statement of what the underneath "means".`,
};

function render() {
  const variantFilter = document.getElementById('filter-variant').value;
  const ratedFilter = document.getElementById('filter-rated').value;
  const content = document.getElementById('content');
  content.innerHTML = '';

  const releaseIds = [...new Set(ROWS.map(r => r.release_id))];
  for (const rid of releaseIds) {
    const meta = RELEASE_META[rid] || { title: rid, description: '', real_tweet: null };
    const rel = document.createElement('div');
    rel.className = 'release';

    const header = document.createElement('div');
    header.className = 'release-header';
    header.innerHTML = `<span class="release-id">${escapeHtml(rid)}</span><span class="release-title">${escapeHtml(meta.title)}</span><div class="release-desc">${escapeHtml(meta.description)}</div>`;
    rel.appendChild(header);

    if (meta.real_tweet) {
      const ref = document.createElement('div');
      ref.className = 'reference';
      ref.innerHTML = `<div class="reference-label">★ REAL INFINEX TWEET — ${escapeHtml(meta.real_tweet_label || '')}</div><div class="reference-text"></div>`;
      ref.querySelector('.reference-text').textContent = meta.real_tweet;
      rel.appendChild(ref);
    }

    const rows = ROWS.filter(r => r.release_id === rid);
    rows.sort((a, b) => VARIANTS_ORDER.indexOf(a.variant_id) - VARIANTS_ORDER.indexOf(b.variant_id));

    let anyVisible = false;
    for (const row of rows) {
      if (variantFilter !== 'all' && row.variant_id !== variantFilter) continue;
      const rated = isRated(row.release_id, row.variant_id);
      if (ratedFilter === 'rated' && !rated) continue;
      if (ratedFilter === 'unrated' && rated) continue;
      rel.appendChild(makeCaptionCard(row));
      anyVisible = true;
    }

    if (anyVisible) content.appendChild(rel);
  }

  updateStats();
}

document.getElementById('filter-variant').addEventListener('change', render);
document.getElementById('filter-rated').addEventListener('change', render);

document.getElementById('export-btn').addEventListener('click', () => {
  const out = ROWS.map(r => ({
    release_id: r.release_id,
    variant_id: r.variant_id,
    caption: r.caption,
    judge_anchoring: r.anchoring_score,
    judge_ship_quality: r.ship_quality,
    judge_voice_fit: r.voice_fit,
    operator_rating: ratings[ratingKey(r.release_id, r.variant_id)] || null,
  }));
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `caption-ratings-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear all ratings? This cannot be undone.')) return;
  ratings = {};
  saveRatings(ratings);
  render();
});

render();
</script>
