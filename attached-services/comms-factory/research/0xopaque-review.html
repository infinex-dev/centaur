const TEMPI = [
  {bucket:"near", name:"materialistic"}, {bucket:"near", name:"human"},
  {bucket:"near", name:"warm"}, {bucket:"near", name:"cool"},
  {bucket:"stable", name:"commanding"}, {bucket:"stable", name:"receptive"},
  {bucket:"stable", name:"practical"}, {bucket:"stable", name:"self-contained"},
  {bucket:"adream", name:"sombre"}, {bucket:"adream", name:"irradiant"},
  {bucket:"adream", name:"overpowering"}, {bucket:"adream", name:"diffused"},
  {bucket:"mobile", name:"unacknowledged"}, {bucket:"mobile", name:"acknowledged"},
  {bucket:"mobile", name:"revealed"}, {bucket:"mobile", name:"concealed"},
  {bucket:"remote", name:"egocentric"}, {bucket:"remote", name:"altruistic"},
  {bucket:"remote", name:"sociable"}, {bucket:"remote", name:"unsociable"},
  {bucket:"awake", name:"acute"}, {bucket:"awake", name:"doubting"},
  {bucket:"awake", name:"certain"}, {bucket:"awake", name:"uncertain"},
];
const BUCKET_OF = Object.fromEntries(TEMPI.map(t=>[t.name,t.bucket]));
const BUCKETS = ["near","stable","adream","mobile","remote","awake"];
const BUCKET_LABEL = {near:"Near",stable:"Stable",adream:"Adream",mobile:"Mobile",remote:"Remote",awake:"Awake"};

const STORE = "opaque-review-v1";
let state = JSON.parse(localStorage.getItem(STORE) || "{}");
// state[postId] = {decision: "agree"|"override", finalTempo: <tempo name>}

function save(){ localStorage.setItem(STORE, JSON.stringify(state)); recompute(); }

function getFinalTempo(p){
  const s = state[p.id];
  if (!s) return null;
  if (s.decision === "agree") return p.ai_tempo;
  if (s.decision === "override") return s.finalTempo;
  return null;
}

function agree(postId){
  state[postId] = {decision:"agree"};
  save();
  renderPost(postId);
}

function override(postId, tempoName){
  state[postId] = {decision:"override", finalTempo:tempoName};
  save();
  renderPost(postId);
}

function agreeAll(){
  if (!confirm("Agree to all unmarked posts (i.e. accept AI's picks)?")) return;
  POSTS.forEach(p => { if (!state[p.id]) state[p.id] = {decision:"agree"}; });
  save();
  POSTS.forEach(p => renderPost(p.id));
}

function resetAll(){
  if (!confirm("Reset all decisions?")) return;
  state = {};
  save();
  POSTS.forEach(p => renderPost(p.id));
}

function recompute(){
  const total = POSTS.length;
  const agreed = Object.values(state).filter(s => s.decision==="agree").length;
  const overridden = Object.values(state).filter(s => s.decision==="override").length;
  const unmarked = total - agreed - overridden;
  document.getElementById("progressText").textContent =
    `${agreed} agreed · ${overridden} overridden · ${unmarked} unmarked (of ${total})`;

  // Distribution from FINAL tempi (agreed=AI, override=user)
  const counts = {};
  TEMPI.forEach(t => counts[t.name] = 0);
  counts._skip = 0;
  POSTS.forEach(p => {
    const final = getFinalTempo(p);
    if (final) counts[final] = (counts[final]||0) + 1;
  });

  const bucketTotal = {};
  BUCKETS.forEach(b => bucketTotal[b] = TEMPI.filter(t=>t.bucket===b).reduce((s,t)=>s+(counts[t.name]||0),0));
  bucketTotal._skip = counts._skip||0;

  const classified = agreed + overridden;
  let txt = `<strong>Placement signal (${classified} of ${total} reviewed):</strong>\n`;
  txt += `\n  Near: ${bucketTotal.near}  ·  Stable: ${bucketTotal.stable}  ·  Adream: ${bucketTotal.adream}`;
  txt += `\n  Mobile: ${bucketTotal.mobile}  ·  Remote: ${bucketTotal.remote}  ·  Awake: ${bucketTotal.awake}  ·  Skip: ${bucketTotal._skip}`;

  if (classified >= 20) {
    const baselines = {near:bucketTotal.near, stable:bucketTotal.stable, adream:bucketTotal.adream};
    const baseline = Object.entries(baselines).sort((a,b)=>b[1]-a[1])[0][0];
    const outers = {mobile:bucketTotal.mobile, remote:bucketTotal.remote, awake:bucketTotal.awake};

    // Stress derivation
    const STRESS = {
      "near-stable":"space","near-awake":"space","near-adream":"flow","near-mobile":"flow",
      "stable-near":"time","stable-awake":"time","stable-adream":"flow","stable-remote":"flow",
      "adream-near":"time","adream-mobile":"time","adream-stable":"space","adream-remote":"space",
    };
    const fires = [];
    Object.entries(outers).forEach(([k,v]) => { if (v>0) fires.push({attitude:k,count:v}); });
    Object.entries(baselines).forEach(([k,v]) => { if (v>0 && k !== baseline) fires.push({attitude:k,count:v}); });
    const votes = {};
    fires.forEach(f => {
      const s = STRESS[`${baseline}-${f.attitude}`];
      if (s) votes[s] = (votes[s]||0) + f.count;
    });
    const stress = Object.entries(votes).sort((a,b)=>b[1]-a[1])[0]?.[0] || "?";

    const top = Object.entries(counts).filter(([k,v])=>v>0 && k!=="_skip").sort((a,b)=>b[1]-a[1]).slice(0,5);
    txt += `\n\n<strong>Derived: ${baseline.toUpperCase()} + ${stress.toUpperCase()}-STRESSED</strong>`;
    txt += `\n  Top tempi: ${top.map(([k,v])=>k+" "+v).join(" · ")}`;
  }
  document.getElementById("stats").innerHTML = txt;
}

let activeFilter = "all";
function filter(mode, btn){
  activeFilter = mode;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  POSTS.forEach(p => {
    const el = document.getElementById("post-"+p.id);
    if (!el) return;
    const s = state[p.id];
    let show = true;
    if (mode === "unmarked") show = !s;
    else if (mode === "low") show = p.ai_conf === "low";
    else if (mode === "overridden") show = s && s.decision === "override";
    el.style.display = show ? "" : "none";
  });
}

function renderPost(postId){
  const p = POSTS.find(x => x.id===postId);
  if (!p) return;
  const el = document.getElementById("post-"+postId);
  if (!el) return;
  const s = state[postId];
  el.classList.toggle("agreed", s && s.decision === "agree");
  el.classList.toggle("overridden", s && s.decision === "override");
  el.classList.toggle("skipped", p.ai_tempo === "_skip" && (!s || s.decision === "agree"));

  // Update action button states
  el.querySelector(".action-agree").classList.toggle("active", s && s.decision==="agree");
  el.querySelector(".action-override").classList.toggle("active", s && s.decision==="override");

  // Update override-panel
  const panel = el.querySelector(".override-panel");
  if (s && s.decision === "override") panel.classList.add("open");
  else if (!s) panel.classList.remove("open");

  // Update selected tempo button in panel
  panel.querySelectorAll(".tempo-btn, .skip-btn").forEach(b => {
    const t = b.dataset.tempo;
    if (s && s.decision === "override" && t === s.finalTempo) b.classList.add("selected");
    else b.classList.remove("selected");
  });
}

function toggleOverride(postId){
  const el = document.getElementById("post-"+postId);
  const panel = el.querySelector(".override-panel");
  panel.classList.toggle("open");
}

function exportJSON(){
  const out = {handle:"0xopaque", reviewed_at:new Date().toISOString(),
    decisions: state,
    final_distribution: (() => {
      const counts = {};
      POSTS.forEach(p => {
        const t = getFinalTempo(p);
        if (t) counts[t] = (counts[t]||0)+1;
      });
      return counts;
    })()
  };
  const blob = new Blob([JSON.stringify(out,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "0xopaque-reviewed-classifications.json";
  a.click();
}

function renderAll(){
  const main = document.getElementById("postList");
  main.innerHTML = POSTS.map((p,i) => {
    const aiBucket = BUCKET_OF[p.ai_tempo] || "skip";
    const overrideGrid = BUCKETS.map(b => {
      const tempi = TEMPI.filter(t=>t.bucket===b);
      return `<div class="tempo-col">
        <div class="tempo-col-header" style="color:var(--${b})">${BUCKET_LABEL[b]}</div>
        ${tempi.map(t => `<button class="tempo-btn" data-tempo="${t.name}" data-bucket="${b}" onclick="override('${p.id}','${t.name}')">${t.name}</button>`).join("")}
      </div>`;
    }).join("");
    return `<div class="post" id="post-${p.id}">
      <div class="post-meta">${i+1}/${POSTS.length} · ${p.date} · ❤${p.likes} 🔁${p.rts} 💬${p.replies} 👁${p.imps} · <a href="https://x.com/0xopaque/status/${p.id}" target="_blank">link</a></div>
      <div class="post-text">${p.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
      <div class="ai-row">
        <span class="ai-pick" data-bucket="${aiBucket}">${p.ai_tempo}</span>
        <span class="ai-conf ${p.ai_conf}">${p.ai_conf}</span>
        <span class="ai-reason">${p.ai_reason.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>
        <div class="actions">
          <button class="agree action-agree" onclick="agree('${p.id}')">Agree</button>
          <button class="override action-override" onclick="toggleOverride('${p.id}')">Override</button>
        </div>
      </div>
      <div class="override-panel">
        <div class="tempo-grid">${overrideGrid}</div>
        <div style="margin-top:6px"><button class="skip-btn" data-tempo="_skip" onclick="override('${p.id}','_skip')">— skip</button></div>
      </div>
    </div>`;
  }).join("");
  POSTS.forEach(p => renderPost(p.id));
}

renderAll();
recompute();
</script>
