        <div class="opform">

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function setV(id, v){
  state[id] = state[id] || {};
  state[id].verdict = state[id].verdict === v ? null : v;
  save();
  const row = document.getElementById("row-"+id);
  const btns = row.querySelectorAll(".vbtn");

  btns.forEach(b => b.className = "vbtn");
  if (state[id].verdict){
    const idx = {green:0, yellow:1, red:2}[state[id].verdict];
    btns[idx].classList.add(map[state[id].verdict]);
  }
  tally();
}
let nt = {};
function setN(id, val){
  state[id] = state[id] || {};
  state[id].notes = val;
  clearTimeout(nt[id]);
  nt[id] = setTimeout(()=>{ save(); const el=document.getElementById("saved-"+id); el.textContent="saved"; setTimeout(()=>el.textContent="",1200); }, 400);
}
function tally(){
  let g=0,y=0,r=0,done=0,dis=0;
  for (const it of DATA){
    const s = state[it.id];

    }

  ["n-done","n-g","n-y","n-r","n-dis"].forEach((id,i)=>document.getElementById(id).textContent=[done,g,y,r,dis][i]);
}
