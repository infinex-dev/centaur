# Launch readiness — 2026-05-28

Synthesis of three parallel audits run today: competitor comms recon, email infrastructure best practices, current Infinex platform email audit. Inputs for the three near-term launches.

**Three near-term launches**
- **Hyperliquid Spark** <span class="pill spark">spark</span> — Phantom-tier motion budget per operator
- **Synthetics Perps in Infinex Perps** <span class="pill synth">synth</span> — hardest to pitch in 280 chars
- **Bridge / on-off-ramps** <span class="pill bridge">bridge</span> — verb-product, fits the easiest tweet shape

**Operating mode shift**: human back in the loop, harness is the review surface, 80% of previous output with 20% of the manual work.

---

## TL;DR

1. **Voice baseline = Hyperliquid terse-fact.** `<subject> is now live on <chain>` shape, ~140 chars, no adjectives/hashtags/exclamations. Phantom-tier *motion* ≠ Phantom-tier *copy*. Promote a `>200 char` advisory flag on launch tweets.
2. **Spark = Kalshi-style tease arc, not a UI demo.** Spend the motion budget on ONE signature object that recurs over 5–7 days (Kalshi's torus precedent). Object becomes Spark's identity. UI-demo motion is one impression; object-tease motion is brand equity. 3–5 candidate motifs proposed below.
3. **Synthetics = Pendle's problem-first body.** Open with market size + the gap, then introduce the product. Hyperliquid's terse pattern doesn't work for products whose value isn't obvious in one sentence.
4. **Bridge = Phantom's three-bullet user-verb shape verbatim.** Use `→` arrows, not emoji droplets. Plus Stargate's 4-word slogan shape ("Bring the Bridge Home" is taken; the *shape* is steal-able).
5. **Email engineer's worry is real and quantified.** Same-mailbox same-apex degrades `security@` deliverability within 48–72h on Gmail/Apple/Yahoo. Subdomain split buys ~75–95% isolation. **Recommended path: stay on Mailtrap, switch marketing to the `bulk` stream + a new `updates.infinex.xyz` subdomain.** ESP isn't the bottleneck — the structural work is.
6. **Platform email today: single sender, eight transactional categories, zero marketing.** `security@app.infinex.xyz` ("Infinex Notifications"), Mailtrap primary (Mailjet legacy fallback). No subscription model, no `List-Unsubscribe` headers anywhere, no per-category opt-out — all of which need to exist before marketing ships, per Google/Yahoo's Nov 2025 enforcement. **~1 week of platform engineering + 30-day warmup before first real campaign.** See [Work remaining](#work-remaining-before-first-marketing-send).
7. **Three new validator rules to promote** (specs below): `rejectHashtags`, `rejectAbstractNounStack`, `rejectAdjectivalStack`. Plus one advisory `lengthFlag` (>200 chars on launch tweets).

## Decisions waiting on you

Three calls to make before drafting copy or building anything.

<div class="decision">

### 1. Email infra path — recommended: stay on Mailtrap, use `bulk` stream + new subdomain

The platform audit and the best-practices research collide cleanly. **The recommendation is to keep Mailtrap and isolate marketing via stream + subdomain, not migrate to Postmark.** Three paths laid out below; Path C is the call.

| Path | Migration cost | Isolation | Time-to-launch |
|---|---|---|---|
| **A — Migrate to Postmark, two streams + two subdomains** | High — dual provider during cutover, full DNS rewrite, retrain runbooks, transitional risk on transactional | ~95% — Postmark refuses marketing on transactional streams | 30–90 days warmup |
| **B — Postmark for transactional + Resend for marketing** | Highest — two new providers, two billing relationships, two vendor-risk surfaces | Maximum — separate providers = separate reputations + IP pools | 30–90 days warmup |
| **C — Stay on Mailtrap, switch marketing to `bulk` stream + new subdomain** *(recommended)* | Near-zero — Mailtrap schema already has `'transactional' \| 'bulk'` enum (`workers/main/src/inngest/functions/emails/mailtrapWebhook.ts:25`); codebase just doesn't select it yet | Medium-high (~75–85%) — same vendor, separate stream pool + separate subdomain | 30 days warmup once subdomain is published |

#### Why not migrate (the "double cost, double labor" instinct is correct)

- **Mailtrap is delivering today.** Your 8 transactional categories ship from `security@app.infinex.xyz` and there's no signal of underperformance. Postmark has the older deliverability reputation (since 2010 vs Mailtrap's production-sending push from ~2023), but the gap is not large enough for crypto-marketing volume to justify migration.
- **The ESP is NOT the gating bottleneck.** The structural gaps — subscription model, RFC 8058 unsubscribe, per-category opt-out, separate Inngest path for batched sends — have to exist regardless of provider. Mailtrap or Postmark, that work is on the critical path. See [Work remaining](#work-remaining-before-first-marketing-send) below.
- **Mailtrap is half-built for this already.** The codebase knows `'transactional' \| 'bulk'` at the webhook layer; plumbing it through the send path is a few hours of work, not a migration.
- **Migration risk window.** A dual-provider cutover means transactional flows (login OTP, withdrawal confirmation) sit in transition. Crypto users on a flaky 2FA email lose funds. Don't introduce that risk to fix something that isn't broken.
- **Migrate later if data warrants.** If after ~3 months of bulk-stream operation Postmaster Tools shows complaint rates >0.3% that don't recover, OR Mailtrap bulk-stream deliverability lags Postmark benchmarks by a meaningful margin, revisit. Decide on data, not on theoretical best-practice.

#### Why the warmup needs 30–90 days

Two independent ramps run in parallel, hence the range.

**Engagement / reputation warmup (~30 days, volume-driven).** Gmail, Yahoo, Outlook, and Apple Mail all classify new sending domains/IPs as *unknown reputation* by default and apply harsher filtering until they observe consistent low-volume sending plus positive engagement (opens, replies, low spam complaints). If you send 10k emails on Day 1 from a fresh `updates.infinex.xyz`:

- The pattern matches "new bulk sender with no history" — the classifier-default for spam domains.
- 30–60% of recipients see the first send in their spam folder.
- Those who would have opened it can't, so positive-engagement signals don't accumulate.
- The filter learns "this subdomain is spammy" and that reputation persists for weeks regardless of future content quality.

The graduated ramp (50/day → 500/day → 2k/day → 8k/day → full volume over ~30 days) gives positive engagement signals time to accumulate at each provider *before* volume scales, so by the time you're sending at full rate the reputation already says "wanted mail."

**DMARC policy ramp (~90 days, observation-driven).** Separate concern. DMARC starts at `p=none` — providers REPORT alignment failures but don't reject mail. You parse the aggregate reports for 2–4 weeks and fix any legitimate sender (e.g. HR tool, calendar invites, partner integrations) that's silently spoofing your domain. Then ramp `p=quarantine pct=25` → `pct=100` → `p=reject`. Each step needs ~2 weeks of clean reports before tightening. If you skip ahead and a legit sender fails alignment, real mail starts getting quarantined or rejected.

**Why the range is 30–90.** The reputation warmup is volume-driven (10k-subscriber list ramps faster than a 100k list); the DMARC ramp is observation-driven (clean DNS finishes faster than messy DNS). Real world: small list + clean config ≈ 30 days. Large list + messy config ≈ 90 days. Aim conservative — being safer-than-sorry here means your security mail keeps working.

**Open question for your engineer:** does the existing internal proxy at `proxy.srv.infinex.app/mailtrap` route both Mailtrap streams or only transactional? Affects whether bulk-stream sends go through the proxy or direct.

**Engineering handoff doc:** [`research/path-c-email-engineering-plan-2026-05-28.md`](path-c-email-engineering-plan-2026-05-28.md) — end-to-end Phase 0–10 plan, file:line refs, effort estimates, 9 open questions for the engineer. Not blocking the three launches; this is the parallel track to unlock marketing email as a comms channel afterwards.

</div>

## Patterns to steal / patterns to avoid

Cross-launch lessons from the competitor recon.

### Steal

<div class="steal">

**1. Hyperliquid's terse-fact tweet shape** <span class="pill all">all 3</span> — `<subject> is now live on <chain>`, ~140 chars, no adjectives, no hashtags, no `!`. The thing is the subject, not the team. Default for all launch-day tweets.

**2. Kalshi's tease → reveal arc** <span class="pill spark">spark</span> — 5–7 day arc anchored by one signature object. Day -7 motion alone → Day -3 + word → Day -1 + date → Day 0 reveal. Spend the motion budget on the object, not the UI.

**3. Pendle's problem-first body** <span class="pill synth">synth</span> — name market scale in $-volume terms, name the gap, introduce the product as the response. Boros opened with "$150–200B daily perp volume" before naming Boros.

**4. Phantom's three-bullet user-verb shape** <span class="pill bridge">bridge</span> <span class="pill spark">spark</span> — `→` + verb + concrete capability. Three bullets, never four. Verbs first, not feature names. Arrows, not droplets.

**5. Polymarket's "the artifact IS the comms"** <span class="pill all">all 3</span> — each launch should ship a native shareable card that stands alone in feed without the tweet body. The `data-card-official` family is built for this; Polymarket is the canonical reference.

**6. Stargate's 4-word slogan shape** <span class="pill bridge">bridge</span> — "Bring the Bridge Home" anchored the entire LayerZero/Stargate merger. The Bridge launch needs one. (Belongs in brand-factory's voice work, not comms-factory.)

**7. Pear Protocol's parallel educational track** <span class="pill synth">synth</span> — pair Synthetics launch tweet with an "how synthetic perps work" thread or micro-course shipped the same week. Two-track comms doubles surface area without doubling work.

**8. Wildcat's hero-copy posture** <span class="pill all">all 3</span> — `On-Chain Credit without Excessive Collateral` is the structural lesson. Subject + the differentiating clause. No verbs. No marketing. Anti-design as differentiation. Applies to product-page heroes that ship alongside launches.

</div>

### Avoid

<div class="avoid">

**1. "Excited to / Thrilled to / Stay tuned"** — caught by validator's `rejectAIslop` today; 6+ orgs in the audit hit some variant. Worth re-confirming the rule's coverage.

**2. Hashtag stacking** — `#BuildOnBase`, `#HyperLiquid` — Hyperliquid/Wildcat/Pendle (the voice anchors closest to Infinex) all avoid hashtags entirely. Promote to `rejectHashtags`.

**3. Token-launch comms eating product comms** — Rainbow, Sport.Fun, Stargate (post-acquisition) all collapsed product into token. Infinex has no token launch in scope, so the risk is structural-future, not present.

**4. Emoji-as-bullet-replacement** — Phantom's 🌊💧 on the Sui launch read cheaper than `→` on the Base launch. Universal-shape arrows > theme-chained emoji.

**5. Adjective-stacking on launch nouns** — `free, open-source, web3, wallet-connection library` (Trust Wallet) is 4 modifiers before the noun. Promote to `rejectAdjectivalStack`.

**6. Multiplicative claims without basis** — "10× faster" works when Catchain 2.0 receipts back it (TON). "Next billion users" doesn't (Phantom). Rule: any scale claim must be in `deployed_facts`.

**7. Founder-as-spokesperson register** — TON/Wildcat/Pear work this way. Infinex is collective-team mode; borrowing founder voice without a founder face reads inauthentic.

**8. PR-distribution leakage** — NEAR Intents' "agentic economy / chain abstraction / unified liquidity" is the Egocentric-tempo failure mode — speaking in tongues only the team understands. Promote to `rejectAbstractNounStack`.

**9. "Endgame" claims** — Ekubo's "AMM Endgame" works because StarkNet shipped genuine structural concentrated-liquidity. Most age badly. Defer to brand-factory if tempted.

**10. Heavy first-person "we" in headlines** — Hyperliquid almost never uses it; Phantom always does. Infinex's Stable + Penetrating placement is closer to Hyperliquid's posture. Default subject-first, not team-first.

</div>

## Validator promotions

Spec-level — implementation is a single PR once you approve.

```ts
// src/validator.ts — proposed additions

export function rejectHashtags(caption: string): ValidationResult {
  // catches any `#\w+` token
  // positive: "Spot perps are now live on Base"  → ok
  // negative: "Spot perps live on Base #BuildOnBase #DeFi"  → fail
}

export function rejectAbstractNounStack(caption: string): ValidationResult {
  // catches ≥3 abstract-noun-class tokens in a span without a concrete subject
  // dictionary: agentic, economy, abstraction, infrastructure, unification, layer,
  //   liquidity, primitive, paradigm, framework, ecosystem, composability...
  // positive: "Cross-chain swaps are live"  → ok
  // negative: "Confidential cross-chain infrastructure for the agentic economy"  → fail
}

export function rejectAdjectivalStack(caption: string): ValidationResult {
  // catches >2 adjectival modifiers immediately preceding a noun
  // positive: "Free, open-source wallet kit"  → ok (2 modifiers)
  // negative: "Free, open-source, web3 wallet-connection library"  → fail (4)
}

export function lengthFlag(caption: string): ValidationResult {
  // advisory only — warn, don't reject
  // positive: "$X is now live on Infinex"  → ok
  // negative: 240-char launch tweet  → warn ("Hyperliquid baseline ~140")
}
```

## Work remaining before first marketing send

Not good-to-go yet. Ordered by criticality. All required. All independent of the Mailtrap-vs-Postmark choice (so none of it is wasted work even if you migrate later).

| # | Work | Where | Effort |
|---|---|---|---|
| 1 | Publish `updates.infinex.xyz` subdomain with separate DKIM, SPF, DMARC records. Tighten apex DMARC to `sp=reject` (stops phishers spoofing other subdomains). | DNS (Cloudflare or wherever `infinex.xyz` is hosted) | 1 day + provider verification |
| 2 | Plumb the `bulk` stream flag through the Mailtrap call path. Add `stream: 'transactional' \| 'bulk'` to the `Email` type (`packages/emails/src/types/types.ts:5-15`), thread through to the Mailtrap request body (`packages/emails/src/services/delivery/mailtrap/index.ts:45-60`). | platform repo | ~0.5 day — schema already aware |
| 3 | New `userEmailPreferences { userId, category, status, updatedAt }` table in the schema (`packages/db/src/schema.ts` near line 1593, beside `undeliverableEmailAddress`). Add `canMarketingEmailBeDelivered(db, userId, category)` predicate next to `canEmailBeDelivered` (`workers/main/src/lib_v2/emails/index.ts:39`). | platform repo | ~1 day — net-new table + predicate + tests |
| 4 | RFC 8058 headers: `List-Unsubscribe: <https://...>, <mailto:...>` AND `List-Unsubscribe-Post: List-Unsubscribe=One-Click`, both in DKIM-signed scope. Plus a public `/unsubscribe?token=…` route that flips the preference without auth. **Zero of this exists today** (grep across the repo: zero `List-Unsubscribe` matches). | platform repo | ~0.5 day — headers in provider clients + route handler |
| 5 | New `platform/send-marketing-email` Inngest event with batched-send semantics. Current `platform/send-email` throttles at 10/min per category (`sendEmail.ts:46-53`) — orders of magnitude too slow for a campaign. | platform repo | ~0.5 day — fork the handler, drop the per-category throttle, add batching |
| 6 | Honor Mailtrap webhook events beyond `bounce`. Today `spam`, `unsubscribe`, `open`, `click` are all received and dropped (`workers/main/src/inngest/functions/emails/mailtrapWebhook.ts:83-105`). `spam` → per-category suppression. `unsubscribe` → preferences flip. `open`/`click` → campaign metrics. | platform repo | ~0.5 day |
| 7 | Monitoring stack: `abuse@infinex.xyz` + `postmaster@infinex.xyz` monitored shared inboxes (RFC 2142, mandatory). Register `infinex.xyz` AND `updates.infinex.xyz` SEPARATELY in Google Postmaster Tools, Yahoo Sender Hub, Microsoft SNDS. Wire a DMARC report parser (dmarcian free tier or Valimail Monitor). | ops + DNS | ~1 day setup, ongoing weekly review |

**Total before first warmup send:** ~3 days platform engineering + ~1 day DNS + ~1 day monitoring setup = roughly a **week of focused work**.

**Then:** 30-day reputation warmup (graduated volume from 50/day → full) **before** the first real campaign.

**Then:** 90-day DMARC ramp from `p=none` → `p=reject` on `updates.`, observed in parallel with the campaign cadence.

**Critical-path order:** items 1–2 unblock the rest (subdomain must be live before any send; bulk flag must work before warmup starts). Items 3–6 can run in parallel by different hands. Item 7 should be done before item 1's first send so monitoring is in place from day one.

<details>
<summary>Email infrastructure best practices — headline rec + setup runbook</summary>

**Source:** [research/email-infra-recommendation-2026-05-28.md](email-infra-recommendation-2026-05-28.md) (357 lines)

**Headline recommendation:** Send marketing from a dedicated subdomain (e.g. `updates.infinex.xyz`) on a separate provider/stream from transactional, with its own DKIM keys, its own `_dmarc.updates.infinex.xyz` record, and a 30-day warmup. Keep `infinex.xyz` apex locked to transactional + security.

### Reputation segmentation answers

- **Same-mailbox same-apex (`updates@infinex.xyz`):** worst option. Complaints degrade `security@` deliverability within 48–72h on Gmail/Apple/Yahoo. This is the failure mode the engineer is right to worry about.
- **Subdomain split (`updates@updates.infinex.xyz`):** ~85–95% isolation. Gmail's primary signal is DKIM `d=` + SPF return-path; weaker org-domain compliance signal prevents full isolation (intentional — stops attackers laundering subdomain reputation).
- **Separate apex (`infinexupdates.xyz`):** bad for crypto. Zero domain age + structurally identical to existing Infinex phishing lookalikes (`infinex.info`, `infinex.network`). Net brand-trust negative.

### Provider comparison

| Provider | Strength | Best for |
|---|---|---|
| Postmark | Hard isolation via Message Streams; refuses marketing on transactional streams | Mission-critical transactional |
| Resend | Modern DX, Vercel-affiliated | Modern SaaS marketing broadcasts |
| SendGrid | High volume, legacy | High-volume legacy senders (operationally heavy) |
| Mailgun | API-first, Stripe under the hood | Mid-volume |
| AWS SES | Cheapest at scale | Highest volume, willing to operate |
| Loops.so | Marketing/lifecycle UX for non-engineers | Marketing-run-by-non-engineers |

**Note:** The rec doc did NOT evaluate Mailtrap (your current provider) head-to-head. Worth a follow-up audit before committing to migration.

### Required DMARC ramp

```
Week 0:   apex p=none; sp=none (audit only)
Week 1-2: confirm DMARC aggregates show all legit senders passing
Week 3-4: apex p=quarantine pct=25; sp=quarantine
Week 5-8: apex p=quarantine pct=100; sp=reject
Week 9-12: apex p=reject; sp=reject; updates. p=quarantine pct=25
Week 13+: updates. ramp to p=reject
```

### Non-negotiables before first marketing send

- RFC 8058 one-click unsubscribe headers (Gmail/Yahoo enforce since Nov 2025)
- `abuse@infinex.xyz` + `postmaster@infinex.xyz` monitored mailboxes (RFC 2142)
- DMARC aggregate report parser (dmarcian free tier or Valimail Monitor)
- Google Postmaster Tools + Yahoo Sender Hub + Microsoft SNDS registrations for BOTH `infinex.xyz` AND `updates.infinex.xyz` separately
- 30-day warmup schedule (capped daily sends, expanding from most-engaged seed audience outward)

</details>

<details>
<summary>Platform email infra — current state at <code>/Users/opaque/platform</code></summary>

**Source:** [research/platform-email-audit-2026-05-28.md](platform-email-audit-2026-05-28.md) (193 lines)

### Current state

- **Repo:** `/Users/opaque/platform` (`@infinex/platform`) — pnpm + Turbo monorepo, Cloudflare Workers backend, Drizzle/PlanetScale (MySQL), Inngest for async work.
- **Providers:** Mailtrap (current primary), Mailjet (legacy fallback). Provider selection per-env via `EMAIL_PROVIDER` enum. Prod routes through internal proxy `proxy.srv.infinex.app/mailtrap`.
- **Sender:** Single identity — `security@app.infinex.xyz` as "Infinex Notifications". Defined once at `packages/emails/src/templates/_shared/render.ts:6-9`.
- **Pipeline:** caller → render React Email in `workers/emails` sub-worker (RPC) → Inngest `platform/send-email` → throttled handler (10/min per category) → provider REST.
- **Templates:** React Email. Per-template: `.tsx` + `-render.ts` + snapshot test. Shared chrome (`Parent.tsx` dark `#17191C`, `Footer.tsx` with "The safest way to get onchain").

### Email categories today (all transactional, zero marketing)

| Category | Subject | Trigger | Priority |
|---|---|---|---|
| `verification` | "Verify your email address" | user changes email | high |
| `sendFunds` | "You've sent funds to a new address" | trpc send flow, new recipient | normal |
| `newAddress` | "New address added" | contact-added flow | normal |
| `confirmedPasskey` | (passkey confirmed) | 24h auto-confirm | normal |
| `deletePasskey` | (passkey deleted) | passkey removed | normal |
| `addPasskey` | (passkey cooldown) | new passkey cooldown start | normal |
| `addTotp` | (TOTP added) | TOTP enrolment | normal |
| `changeTotp` | (TOTP changed) | TOTP change | normal |

### What doesn't exist

- **No subscription / preferences model.** `packages/db/src/schema.ts:124-126` user table has `email` + `emailVerified` only. No `emailPreferences` / `notificationPreferences` table.
- **No `List-Unsubscribe` headers.** Grep across the repo: zero matches. Disqualifying for any marketing send at >5k/day post-Feb 2024.
- **No per-category opt-out.** Mailtrap webhook receives `unsubscribe` events but the handler drops them — only `bounce` writes to DB.
- **No marketing/announcement/newsletter category.** Confirmed by grep: zero matches across all email code paths.

### What's already half-built

- **Mailtrap `bulk` stream awareness.** Schema enum at `mailtrapWebhook.ts:25` knows `'transactional' | 'bulk'` but no code path selects the bulk stream when calling Mailtrap's API. Half a feature flag away from a working bulk-stream path.
- **Provider abstraction is clean.** `EmailDeliveryService` interface at `packages/emails/src/types/types.ts:17` — a marketing ESP can be slotted in as a third implementation alongside Mailjet/Mailtrap without touching call sites.
- **MX-record gating** (`sendEmail.ts:66-82`) — cheap deliverability hygiene that's nice to keep for marketing too.
- **Hard-bounce suppression list** (`undeliverable_email_address` table) — works for transactional, will need partitioning for per-category marketing suppression.

### Six things to add for marketing channel (ordered by criticality)

1. Distinct sending subdomain + second sender identity beside `notificationsSender`.
2. Mailtrap `bulk` stream path (flag plumbed through `Email` type + Mailtrap request body) — OR a second ESP.
3. `userEmailPreferences { userId, category, status, updatedAt }` table + `canMarketingEmailBeDelivered(db, userId, category)` predicate.
4. RFC 8058 `List-Unsubscribe` + `List-Unsubscribe-Post: List-Unsubscribe=One-Click` headers in DKIM-signed scope. Public `/unsubscribe?token=…` route that flips the preference.
5. Honor Mailtrap webhook events beyond `bounce` (currently `spam` / `unsubscribe` / `open` / `click` all dropped).
6. Separate `platform/send-marketing-email` Inngest event with batched-send semantics — current 10/min throttle is far too slow for a campaign.
